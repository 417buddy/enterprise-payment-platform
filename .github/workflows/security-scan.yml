name: Security Scan Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  security-scan:
    runs-on: [self-hosted, security]  # ← Targets your EC2 runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Runner Info
        run: |
          hostname
          whoami
          docker --version
          trivy --version

      - name: File System Vulnerability Scan
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 1 .

      - name: Docker Image Build & Scan
        run: |
          docker build -t app-test .
          trivy image --severity HIGH,CRITICAL app-test

      - name: Terraform Validation
        run: |
          terraform init -backend=false
          terraform validate

      - name: Upload Scan Reports (Optional)
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: ./trivy-report/
