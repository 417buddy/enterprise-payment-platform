name: CI/CD Pipeline - Payment Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Simple Test Job
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test basic commands
      run: |
        echo "=== Runner Health Check ==="
        echo "Git: $(git --version)"
        echo "Docker: $(docker --version)"
        echo "AWS: $(aws --version)"
        echo "kubectl: $(kubectl version --client)"
        echo "jq: $(jq --version)"
        echo ""
        echo "All tools available!"

    - name: Create test file
      run: |
        echo "Test successful" > test-result.txt
        cat test-result.txt

    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-result.txt

    - name: Summary
      run: |
        echo "# Test Passed" >> $GITHUB_STEP_SUMMARY
        echo "Runner is working correctly!" >> $GITHUB_STEP_SUMMARY
