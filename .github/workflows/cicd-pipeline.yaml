name: CI/CD Pipeline - Payment Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: self-hosted
    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Show Environment
      run: |
        echo "=== Environment ==="
        echo "Runner: $RUNNER_NAME"
        echo "OS: $RUNNER_OS"
        echo "Success!"

    - name: 3. Check Tools
      run: |
        echo "=== Tools ==="
        echo "Git: $(git --version)"
        echo "Docker: $(docker --version)"
        echo "Success!"

    - name: 4. Build Test
      run: |
        echo "=== Build ==="
        mkdir -p build
        echo "Build successful" > build/result.txt
        cat build/result.txt
        echo "Build completed!"

    - name: 5. Summary
      run: |
        echo "# Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "Pipeline completed without errors!" >> $GITHUB_STEP_SUMMARY
        echo ""
        echo "Note: Artifact upload disabled due to quota limits"
