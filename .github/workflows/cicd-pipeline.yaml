name: CI/CD Pipeline - Payment Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: self-hosted
    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4
      continue-on-error: true

    - name: 2. Show Environment
      run: |
        echo "=== Environment ==="
        echo "Runner: $RUNNER_NAME"
        echo "OS: $RUNNER_OS"
        echo "Success!"

    - name: 3. Check Tools
      run: |
        echo "=== Tools ==="
        echo "Git: $(git --version 2>&1 || echo 'not found')"
        echo "Docker: $(docker --version 2>&1 || echo 'not found')"
        echo "Success!"

    - name: 4. Create Build Artifact
      run: |
        echo "=== Build ==="
        mkdir -p build
        echo "Build successful" > build/result.txt
        echo "Build completed!"

    - name: 5. Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: build/
        retention-days: 1

    - name: 6. Summary
      run: |
        echo "# Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "Pipeline completed without errors!" >> $GITHUB_STEP_SUMMARY